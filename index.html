<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness 2026 — Squares Pool Tracker</title>
  <style>
    :root {
      --bg: #0f1923;
      --surface: #1a2733;
      --surface2: #243447;
      --accent: #ff6b35;
      --accent2: #ffd700;
      --text: #e8e8e8;
      --text-muted: #8899aa;
      --green: #4caf50;
      --red: #ef5350;
      --blue: #1976d2;
      --border: #2d4050;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a2733 0%, #0d3b66 100%);
      padding: 20px 30px;
      border-bottom: 3px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FFD700;
    }

    header h1 span { color: var(--text); font-weight: 400; }

    .prize-pool {
      font-size: 0.9rem;
      color: var(--accent2);
      font-weight: 600;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 14px 28px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn:hover { color: var(--text); background: var(--surface2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; padding: 24px; }
    .tab-content.active { display: block; }

    /* Tab 1: Grid Setup */
    .grid-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
    }

    .grid-scroll-outer { position: relative; }

    .grid-scroll-outer::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 28px;
      background: linear-gradient(to left, rgba(15, 25, 35, 0.85), transparent);
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.2s;
      display: none;
    }

    .grid-scroll-outer.at-end::after { opacity: 0; }

    .scroll-hint {
      display: none;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 4px 0 8px;
    }

    .grid-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .grid-header h2 { font-size: 1.2rem; }

    .grid-actions button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      margin-left: 8px;
      transition: all 0.2s;
    }

    .grid-actions button:disabled { opacity: 0.35; cursor: default; }
    .grid-actions button:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }
    .grid-actions button.save-btn:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
    .grid-actions button.save-btn:not(:disabled):hover { background: #e55a28; }
    .grid-actions button.export-btn:not(:disabled) { background: #2e7d32; color: #fff; border-color: #2e7d32; }
    .grid-actions button.export-btn:not(:disabled):hover { background: #1b5e20; }

    .grid-with-labels {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .y-axis-label {
      writing-mode: vertical-lr;
      transform: rotate(180deg);
      text-align: center;
      font-weight: 600;
      color: var(--accent2);
      font-size: 0.85rem;
      padding-right: 8px;
      white-space: nowrap;
    }

    .grid-and-x-label {
      display: flex;
      flex-direction: column;
    }

    .x-axis-label {
      text-align: center;
      font-weight: 600;
      color: var(--accent2);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    table.pool-grid {
      border-collapse: collapse;
      margin: 0 auto;
    }

    table.pool-grid th,
    table.pool-grid td {
      width: 80px;
      height: 44px;
      text-align: center;
      border: 1px solid var(--border);
      font-size: 0.8rem;
    }

    table.pool-grid th {
      background: var(--surface2);
      color: var(--accent2);
      font-weight: 700;
    }

    /* Sticky first column — row labels stay visible while scrolling */
    table.pool-grid th:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      background: var(--surface2);
    }

    table.pool-grid .corner {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    table.pool-grid .axis-input {
      width: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent2);
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px;
    }

    table.pool-grid td.cell {
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    table.pool-grid td.cell:not(.locked):hover { background: var(--surface2); }
    table.pool-grid td.cell.locked { cursor: default; }

    table.pool-grid td.cell.highlighted {
      background: rgba(255, 107, 53, 0.2);
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .cell-name {
      font-size: 0.72rem;
      line-height: 1.2;
      padding: 2px;
      word-break: break-word;
    }

    .cell-input {
      width: 100%;
      height: 100%;
      background: var(--surface2);
      border: 2px solid var(--accent);
      color: var(--text);
      text-align: center;
      font-size: 0.75rem;
      padding: 2px;
    }

    /* Tab 2: Results */
    .data-source-note {
      display: inline-block;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .data-source-note.live { background: #1b5e20; color: #a5d6a7; }
    .data-source-note.fallback { background: #e65100; color: #ffcc80; }

    .results-section { margin-bottom: 32px; }
    .results-section .round-header {
      font-size: 1rem;
      color: var(--accent2);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      gap: 8px;
      font-weight: inherit;
    }
    .results-section .round-header:hover { opacity: 0.8; }
    .round-toggle-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      flex-shrink: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      color: #fff;
    }
    .results-section.collapsed .round-toggle-icon::before { content: '+'; }
    .results-section:not(.collapsed) .round-toggle-icon::before { content: '−'; }
    .results-section.collapsed .round-body { display: none; }
    .results-section:not(.collapsed) .round-body { display: block; }

    .table-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
    }

    .results-table th {
      background: var(--surface2);
      padding: 10px 12px;
      text-align: left;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .results-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .results-table tr:hover td { background: rgba(255,255,255,0.03); }

    .seed-badge {
      display: inline-block;
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 4px;
      min-width: 20px;
      text-align: center;
    }

    .winner-team { color: var(--green); font-weight: 600; }
    .loser-team { color: var(--text-muted); }

    .coord-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .payout-badge { color: var(--accent2); font-weight: 700; }
    .status-pre { color: var(--text-muted); font-style: italic; }

    /* Tab 3: Leaderboard */
    .leaderboard-table {
      width: 100%;
      max-width: 700px;
      border-collapse: collapse;
    }

    .leaderboard-table th {
      background: var(--surface2);
      padding: 12px 16px;
      text-align: left;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .leaderboard-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    .leaderboard-table tr:hover td { background: rgba(255,255,255,0.03); }

    .rank-cell { color: var(--accent2); font-weight: 700; width: 50px; }
    .name-cell { font-weight: 600; }
    .wins-cell { color: var(--text-muted); text-align: center; }
    .total-cell { color: var(--green); font-weight: 700; font-size: 1.05rem; text-align: right; }

    .no-data {
      color: var(--text-muted);
      font-style: italic;
      padding: 40px;
      text-align: center;
    }

    .updated-note {
      text-align: right;
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-bottom: 16px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================================
       MOBILE STYLES — optimized for ~375px screens
       ============================================================ */
    @media (max-width: 600px) {
      header {
        padding: 12px 16px;
        flex-wrap: wrap;
        gap: 4px;
      }

      header h1 { font-size: 1.15rem; }
      .prize-pool { font-size: 0.8rem; }

      .tabs { overflow-x: auto; }

      .tab-btn {
        padding: 12px 16px;
        font-size: 0.85rem;
        flex: 1;
        min-width: 80px;
        white-space: nowrap;
      }

      .tab-content { padding: 12px; }

      /* Grid: tighter cells so less scrolling needed */
      table.pool-grid th,
      table.pool-grid td {
        width: 56px;
        height: 40px;
        font-size: 0.72rem;
      }

      table.pool-grid th:first-child,
      table.pool-grid td:first-child {
        width: 50px;
      }

      table.pool-grid .axis-input {
        width: 34px;
        font-size: 0.78rem;
      }

      .cell-name {
        font-size: 0.62rem;
        padding: 1px;
      }

      .y-axis-label { display: none; }
      .x-axis-label { font-size: 0.72rem; }

      .grid-with-labels { justify-content: flex-start; }

      .scroll-hint { display: block; }

      /* Right-edge fade shadow hints that the table is scrollable */
      .grid-scroll-outer::after { display: block; }

      .grid-header { margin-bottom: 8px; }
      .grid-header h2 { font-size: 1rem; }
      .grid-actions button { padding: 8px 12px; font-size: 0.8rem; margin-left: 4px; }

      /* Results: tighter */
      .results-section { margin-bottom: 20px; }
      .results-section .round-header { font-size: 0.9rem; margin-bottom: 8px; padding: 10px 0 8px; }

      .results-table th {
        padding: 8px 8px;
        font-size: 0.72rem;
      }

      .results-table td {
        padding: 8px 8px;
        font-size: 0.78rem;
      }

      .seed-badge {
        font-size: 0.62rem;
        padding: 1px 4px;
        min-width: 16px;
      }

      .coord-badge { font-size: 0.72rem; padding: 2px 6px; }

      .updated-note { font-size: 0.7rem; }

      /* Leaderboard: full width */
      .leaderboard-table { max-width: 100%; }
      .leaderboard-table th { padding: 10px 12px; font-size: 0.75rem; }
      .leaderboard-table td { padding: 10px 12px; font-size: 0.88rem; }
      .total-cell { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>March Madness 2026 <span>— Squares Pool</span></h1>
  <div class="prize-pool">Prize Pool: $10,000</div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="grid">Grid Setup</button>
  <button class="tab-btn" data-tab="results">Results</button>
  <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
</nav>

<!-- TAB 1: Grid Setup -->
<div id="tab-grid" class="tab-content active">
  <div class="grid-header">
    <h2>Pool Grid</h2>
    <div class="grid-actions">
      <button id="btnClear" onclick="clearGrid()" disabled>Clear All</button>
      <button id="btnExport" onclick="exportGrid()" class="export-btn" disabled>Export JSON</button>
      <button id="btnSave" class="save-btn" onclick="saveGrid()" disabled>Save</button>
    </div>
  </div>
  <div class="scroll-hint">← Scroll to see full grid →</div>
  <div class="grid-scroll-outer">
    <div class="grid-container">
      <div class="grid-with-labels">
        <div class="y-axis-label">Worse Seed (Away)</div>
        <div class="grid-and-x-label">
          <table class="pool-grid" id="poolGrid"></table>
          <div class="x-axis-label">Better Seed (Home)</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TAB 2: Results -->
<div id="tab-results" class="tab-content">
  <div class="updated-note" id="updatedNote"></div>
  <div id="resultsContainer"><div class="loading">Loading results</div></div>
</div>

<!-- TAB 3: Leaderboard -->
<div id="tab-leaderboard" class="tab-content">
  <h2 style="margin-bottom: 16px;">Leaderboard</h2>
  <div id="leaderboardContainer"><div class="loading">Loading</div></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const STORAGE_KEY = 'mm2026_grid';
const NCAA_API = 'https://ncaa-api.henrygd.me';

// Embedded grid config — source of truth when localStorage and fetch are unavailable
const DEFAULT_GRID = {
  "xAxis": ["8", "4", "2", "3", "0", "9", "6", "1", "7", "5"],
  "yAxis": ["5", "7", "2", "4", "0", "6", "1", "3", "8", "9"],
  "names": [
    ["Brient", "Doug C", "JMC", "Buck", "Kirk", "Tuck", "Bryce J", "Ben M", "Nick Harris", "Matt F"],
    ["Kirk", "Ben M", "Doug C", "Shinn & Co", "A. Davis", "Buck", "Shinn & Co", "Moreland", "Matt F", "Nick Harris Jr"],
    ["Buck", "Monte", "Dr B", "Youngs", "Grant", "Baron", "Sean Q", "Matt F", "Gabe", "Ben M"],
    ["PXG", "Buck", "The Cooks", "Ben M", "Skittles", "Sean Q", "Matt F", "Doug C", "Jeff Mason", "BCM"],
    ["Woody", "Ben M", "Brock", "McGraw", "Tad", "Matt F", "Shinn & Co", "T$", "Buck", "Greyson Brown"],
    ["Ben M", "Shinn & Co", "Nate & Jacob", "Soto", "Sligh", "Shinn & Co", "Sean Q", "Buck", "Camela & Kelly", "Grant P"],
    ["Chip", "Sam Cook", "Jeff Mason", "T$", "Shinn & Co", "Kitchen", "Grant P", "Youngs", "Skittles", "Buck"],
    ["Ben M", "Bryce J", "Grant P", "Brient", "Doug C", "Bald", "Buck", "Shinn & Co", "Alea", "Ben M"],
    ["Barrett", "Katie", "Shinn & Co", "Waddell", "Buck", "Davidson", "Dyer", "the Cooks", "Monte", "Doyle"],
    ["Skittles", "Barrett", "Buck", "Doug C", "Ben M", "Greyson Brown", "Ronk", "Jeff Mason", "Harper", "Dr B"]
  ]
};

const ROUND_SCHEDULE = [
  { round: 1, name: 'Round of 64',   payout: 50,   dates: ['2026-03-19', '2026-03-20'], expectedGames: 32 },
  { round: 2, name: 'Round of 32',   payout: 100,  dates: ['2026-03-21', '2026-03-22'], expectedGames: 16 },
  { round: 3, name: 'Sweet 16',      payout: 200,  dates: ['2026-03-27', '2026-03-28'], expectedGames: 8 },
  { round: 4, name: 'Elite Eight',   payout: 400,  dates: ['2026-03-29', '2026-03-30'], expectedGames: 4 },
  { round: 5, name: 'Final Four',    payout: 800,  dates: ['2026-04-04'],               expectedGames: 2 },
  { round: 6, name: 'Championship',  payout: 2000, dates: ['2026-04-06'],               expectedGames: 1 },
];

// ============================================================
// STATE
// ============================================================
let gridData = null;
let tournamentData = null;
let dataSource = 'none';

// ============================================================
// TAB NAVIGATION
// ============================================================
function activateTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const btn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
  if (btn) btn.classList.add('active');
  const content = document.getElementById('tab-' + tabId);
  if (content) content.classList.add('active');
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activateTab(btn.dataset.tab);
    localStorage.setItem('mm_active_tab', btn.dataset.tab);
  });
});

(function restoreTab() {
  const saved = localStorage.getItem('mm_active_tab');
  if (saved && document.querySelector(`.tab-btn[data-tab="${saved}"]`)) {
    activateTab(saved);
  }
})();

// ============================================================
// TAB 1: GRID
// ============================================================
function emptyGrid() {
  return {
    xAxis: ['', '', '', '', '', '', '', '', '', ''],
    yAxis: ['', '', '', '', '', '', '', '', '', ''],
    names: Array.from({ length: 10 }, () => Array(10).fill(''))
  };
}

async function loadGrid() {
  // Priority: localStorage > fetched grid-config.json > embedded DEFAULT_GRID
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { return JSON.parse(saved); } catch (e) { /* fall through */ }
  }

  try {
    const resp = await fetch('data/grid-config.json');
    if (resp.ok) {
      const config = await resp.json();
      return config;
    }
  } catch (e) { /* fall through — expected on file:// protocol */ }

  // Use embedded default (works on file:// and when JSON fetch fails)
  return JSON.parse(JSON.stringify(DEFAULT_GRID));
}

function saveGrid() {
  for (let i = 0; i < 10; i++) {
    gridData.xAxis[i] = document.getElementById('x-' + i).value;
    gridData.yAxis[i] = document.getElementById('y-' + i).value;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(gridData));
  renderResults();
  renderLeaderboard();
  alert('Grid saved!');
}

function exportGrid() {
  // Capture current axis values before exporting
  for (let i = 0; i < 10; i++) {
    gridData.xAxis[i] = document.getElementById('x-' + i).value;
    gridData.yAxis[i] = document.getElementById('y-' + i).value;
  }
  const json = JSON.stringify(gridData, null, 2);
  const blob = new Blob([json + '\n'], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'grid-config.json';
  a.click();
  URL.revokeObjectURL(url);
}

let editingEnabled = false;

// Enable editing via browser console: enableEditing()
function enableGridEditing() {
  editingEnabled = true;
  document.getElementById('btnClear').disabled = false;
  document.getElementById('btnExport').disabled = false;
  document.getElementById('btnSave').disabled = false;
  renderGrid();
}

function clearGrid() {
  if (!confirm('Clear all names and axis numbers?')) return;
  gridData = emptyGrid();
  localStorage.removeItem(STORAGE_KEY);
  renderGrid();
  renderResults();
  renderLeaderboard();
}

function renderGrid() {
  const table = document.getElementById('poolGrid');
  let html = '';

  // Header row: corner + X-axis inputs
  html += '<tr>';
  html += '<th class="corner" style="width:90px;">Y \\ X</th>';
  const disabled = editingEnabled ? '' : 'disabled';
  for (let x = 0; x < 10; x++) {
    html += `<th><input type="text" class="axis-input" id="x-${x}" maxlength="1" value="${escAttr(gridData.xAxis[x])}" placeholder="${x}" ${disabled}></th>`;
  }
  html += '</tr>';

  // Data rows
  for (let y = 0; y < 10; y++) {
    html += '<tr>';
    html += `<th><input type="text" class="axis-input" id="y-${y}" maxlength="1" value="${escAttr(gridData.yAxis[y])}" placeholder="${y}" ${disabled}></th>`;
    for (let x = 0; x < 10; x++) {
      const name = gridData.names[y][x];
      html += `<td class="cell${editingEnabled ? '' : ' locked'}" data-y="${y}" data-x="${x}"><div class="cell-name">${escHtml(name)}</div></td>`;
    }
    html += '</tr>';
  }

  table.innerHTML = html;

  if (!editingEnabled) return; // Skip click handlers when locked

  // Click to edit cells
  table.querySelectorAll('td.cell').forEach(td => {
    td.addEventListener('click', () => {
      if (td.querySelector('input')) return; // Already editing
      const y = parseInt(td.dataset.y);
      const x = parseInt(td.dataset.x);
      const current = gridData.names[y][x];
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'cell-input';
      input.value = current;
      td.innerHTML = '';
      td.appendChild(input);
      input.focus();

      function commit() {
        gridData.names[y][x] = input.value.trim();
        td.innerHTML = `<div class="cell-name">${escHtml(gridData.names[y][x])}</div>`;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gridData));
      }

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { input.blur(); }
        if (e.key === 'Escape') { td.innerHTML = `<div class="cell-name">${escHtml(current)}</div>`; }
      });
    });
  });
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

async function fetchScoreboardForDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const url = `${NCAA_API}/scoreboard/basketball-men/d1/${y}/${m}/${d}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

function etToCt(timeStr) {
  if (!timeStr || typeof timeStr !== 'string') return timeStr;
  if (/CT$/i.test(timeStr)) return timeStr; // Already converted
  // Match "H:MM AM/PM" with optional ET/EDT/EST suffix (API may omit the suffix)
  const m = timeStr.match(/^(\d+):(\d+)\s*(AM|PM)(?:\s*E[SD]?T)?$/i);
  if (!m) return timeStr;
  let hours = parseInt(m[1], 10);
  const minutes = m[2];
  const period = m[3].toUpperCase();
  if (period === 'PM' && hours !== 12) hours += 12;
  if (period === 'AM' && hours === 12) hours = 0;
  hours -= 1;
  const newPeriod = hours >= 12 ? 'PM' : 'AM';
  if (hours > 12) hours -= 12;
  if (hours === 0) hours = 12;
  return `${hours}:${minutes} ${newPeriod} CT`;
}

function parseApiGames(apiData, dateStr) {
  // The NCAA API returns a games array. Each entry may be structured as:
  //   { game: { ... }, teams: [ ... ] }
  // or as a flat object. We handle both.
  const raw = apiData.games || [];
  const games = [];

  for (const entry of raw) {
    try {
      let gameObj, teamsArr;

      if (entry.game && entry.teams) {
        gameObj = entry.game;
        teamsArr = entry.teams;
      } else {
        continue;
      }

      // Only include tournament games (both teams have seeds)
      if (!teamsArr || teamsArr.length < 2) continue;

      const team0seed = teamsArr[0].seed;
      const team1seed = teamsArr[1].seed;
      if (!team0seed && !team1seed) continue;

      const awayTeam = teamsArr.find(t => t.isHome === false) || teamsArr[0];
      const homeTeam = teamsArr.find(t => t.isHome === true) || teamsArr[1];

      const getName = (t) => t.nameShort || t.names?.short || t.teamName || t.name || '??';
      const getScore = (t) => {
        const s = t.score;
        if (s === undefined || s === null || s === '') return null;
        return parseInt(s, 10);
      };

      const state = (gameObj.gameState || 'pre').toLowerCase().trim();
      // Normalize game states: "final" variants
      const isFinal = state.includes('final');

      games.push({
        gameID: String(gameObj.gameID || ''),
        date: dateStr,
        startTime: etToCt(gameObj.startTime || gameObj.startTimeEpoch || ''),
        network: gameObj.network || '',
        gameState: isFinal ? 'final' : state,
        away: {
          team: getName(awayTeam),
          seed: parseInt(awayTeam.seed, 10) || 0,
          score: getScore(awayTeam)
        },
        home: {
          team: getName(homeTeam),
          seed: parseInt(homeTeam.seed, 10) || 0,
          score: getScore(homeTeam)
        }
      });
    } catch (e) {
      console.warn('Skipping unparsable game entry:', e);
    }
  }

  return games;
}

function makeTbdGames(count, roundInfo) {
  const games = [];
  for (let i = 0; i < count; i++) {
    games.push({
      gameID: `tbd-${roundInfo.round}-${i}`,
      date: roundInfo.dates[0],
      startTime: 'TBD',
      network: '',
      gameState: 'tbd',
      away: { team: 'TBD', seed: 0, score: null },
      home: { team: 'TBD', seed: 0, score: null }
    });
  }
  return games;
}

async function fetchLiveResults() {
  const today = todayStr();
  const rounds = [];
  let anyData = false;

  for (const roundInfo of ROUND_SCHEDULE) {
    const datesToFetch = roundInfo.dates.filter(d => d <= today);

    let games = [];
    if (datesToFetch.length > 0) {
      const dateResults = await Promise.allSettled(
        datesToFetch.map(d => fetchScoreboardForDate(d).then(data => ({ data, date: d })))
      );

      for (const result of dateResults) {
        if (result.status === 'fulfilled') {
          const parsed = parseApiGames(result.value.data, result.value.date);
          games.push(...parsed);
          anyData = true;
        }
      }
    }

    // Pad with TBD games if we have fewer than expected
    if (games.length < roundInfo.expectedGames) {
      const tbdCount = roundInfo.expectedGames - games.length;
      games.push(...makeTbdGames(tbdCount, roundInfo));
    }

    rounds.push({
      round: roundInfo.round,
      name: roundInfo.name,
      payout: roundInfo.payout,
      games
    });
  }

  if (!anyData) throw new Error('No data returned from API');

  return {
    lastUpdated: new Date().toLocaleString(),
    source: 'live',
    rounds
  };
}

async function fetchFallbackResults() {
  // Try fetching the JSON file first (works on HTTP), fall back to embedded data
  try {
    const resp = await fetch('data/tournament-results.json');
    if (resp.ok) {
      const data = await resp.json();
      data.source = 'fallback';
      return data;
    }
  } catch (e) { /* fall through */ }

  // Use embedded data (works on file:// protocol)
  const data = JSON.parse(JSON.stringify(FALLBACK_RESULTS));
  data.source = 'embedded';
  // Pad any rounds with fewer games than expected
  for (const roundInfo of ROUND_SCHEDULE) {
    let round = data.rounds.find(r => r.round === roundInfo.round);
    if (!round) {
      round = { round: roundInfo.round, name: roundInfo.name, payout: roundInfo.payout, games: [] };
      data.rounds.push(round);
    }
    if (round.games.length < roundInfo.expectedGames) {
      round.games.push(...makeTbdGames(roundInfo.expectedGames - round.games.length, roundInfo));
    }
  }
  data.rounds.sort((a, b) => a.round - b.round);
  return data;
}

// Normalize any data source: remove non-payout rounds, ensure all 6 rounds exist, pad TBD
function normalizeResults(data) {
  // Remove any rounds not in ROUND_SCHEDULE (e.g. First Four)
  const validRounds = new Set(ROUND_SCHEDULE.map(r => r.round));
  data.rounds = data.rounds.filter(r => validRounds.has(r.round));

  // Ensure all 6 rounds exist and pad with TBD games
  for (const roundInfo of ROUND_SCHEDULE) {
    let round = data.rounds.find(r => r.round === roundInfo.round);
    if (!round) {
      round = { round: roundInfo.round, name: roundInfo.name, payout: roundInfo.payout, games: [] };
      data.rounds.push(round);
    }
    if (round.games.length < roundInfo.expectedGames) {
      round.games.push(...makeTbdGames(roundInfo.expectedGames - round.games.length, roundInfo));
    }
  }

  data.rounds.sort((a, b) => a.round - b.round);
  return data;
}

async function loadResults() {
  // Try live API first, fall back to static JSON
  try {
    tournamentData = await fetchLiveResults();
    dataSource = 'live';
    console.log('Loaded live data from NCAA API');
  } catch (e) {
    console.warn('Live API failed, using fallback:', e.message);
    try {
      tournamentData = await fetchFallbackResults();
      dataSource = 'fallback';
      console.log('Loaded fallback data from static JSON');
    } catch (e2) {
      console.error('All data sources failed:', e2);
      dataSource = 'none';
    }
  }

  // Always normalize regardless of source
  if (tournamentData) {
    tournamentData = normalizeResults(tournamentData);
  }
}

function getWinningCoord(game) {
  if (game.gameState !== 'final') return null;
  if (game.away.score === null || game.home.score === null) return null;

  const awaySeed = game.away.seed;
  const homeSeed = game.home.seed;

  if (awaySeed === homeSeed) return null; // Same seed (First Four)
  if (!awaySeed || !homeSeed) return null;

  let worseSeedScore, betterSeedScore;
  if (awaySeed > homeSeed) {
    worseSeedScore = game.away.score;
    betterSeedScore = game.home.score;
  } else {
    worseSeedScore = game.home.score;
    betterSeedScore = game.away.score;
  }

  return {
    y: worseSeedScore % 10,
    x: betterSeedScore % 10
  };
}

function lookupGridSquare(yDigit, xDigit) {
  let gridY = -1, gridX = -1;
  for (let i = 0; i < 10; i++) {
    if (gridData.yAxis[i] === String(yDigit)) gridY = i;
    if (gridData.xAxis[i] === String(xDigit)) gridX = i;
  }
  if (gridY === -1 || gridX === -1) return { name: '(axis not set)', gridY, gridX };
  return { name: gridData.names[gridY][gridX] || '(empty)', gridY, gridX };
}

  const seenLiveRounds = (() => {
    try { return JSON.parse(localStorage.getItem('mm_results_live_rounds')) || {}; } catch { return {}; }
  })();

  container.querySelectorAll('.results-section').forEach(section => {
    const round = section.dataset.round;
    const roundData = tournamentData && tournamentData.rounds.find(r => String(r.round) === round);
    const hasLive = roundData && roundData.games.some(g =>
      g.gameState !== 'final' && g.gameState !== 'pre' && g.gameState !== 'tbd'
    );

    if (hasLive && !seenLiveRounds[round]) {
      // Newly live round — auto-expand and record so user's future collapses are respected
      section.classList.remove('collapsed');
      seenLiveRounds[round] = true;
      localStorage.setItem('mm_results_live_rounds', JSON.stringify(seenLiveRounds));
      sectionStates[round] = true;
      localStorage.setItem('mm_results_sections', JSON.stringify(sectionStates));
    } else if (sectionStates[round] === true) {
      section.classList.remove('collapsed');
    }

  });

  // Single delegated click handler — more reliable across all desktop browsers
  // than attaching individual listeners to h3 elements with display:flex.
  container.addEventListener('click', (e) => {
    const header = e.target.closest('.round-header');
    if (!header) return;
    const section = header.closest('.results-section');
    if (!section) return;
    const round = section.dataset.round;
    section.classList.toggle('collapsed');
    const states = (() => {
      try { return JSON.parse(localStorage.getItem('mm_results_sections')) || {}; } catch { return {}; }
    })();
    states[round] = !section.classList.contains('collapsed');
    localStorage.setItem('mm_results_sections', JSON.stringify(states));
  });
}

// ============================================================
// TAB 3: LEADERBOARD
// ============================================================
function renderLeaderboard() {
  if (!tournamentData) {
    document.getElementById('leaderboardContainer').innerHTML =
      '<div class="no-data">No data loaded.</div>';
    return;
  }

  const container = document.getElementById('leaderboardContainer');
  const totals = {};

  tournamentData.rounds.forEach(round => {
    if (round.payout === 0) return;
    round.games.forEach(game => {
      const coord = getWinningCoord(game);
      if (!coord) return;
      const sq = lookupGridSquare(coord.y, coord.x);
      if (!sq.name || sq.name === '(axis not set)' || sq.name === '(empty)') return;

      if (!totals[sq.name]) totals[sq.name] = { wins: 0, total: 0, games: [] };
      totals[sq.name].wins++;
      totals[sq.name].total += round.payout;
      totals[sq.name].games.push({
        matchup: `${game.away.team} vs ${game.home.team}`,
        round: round.name,
        payout: round.payout,
        coord: `${coord.y}/${coord.x}`
      });
    });
  });

  const sorted = Object.entries(totals).sort((a, b) => b[1].total - a[1].total);

  if (sorted.length === 0) {
    container.innerHTML = '<div class="no-data">No winners yet. Set up your grid in the Grid Setup tab and results will appear here.</div>';
    return;
  }

  let html = `<table class="leaderboard-table">`;
  html += `<tr><th>#</th><th>Name</th><th>Wins</th><th style="text-align:right">Total</th></tr>`;

  sorted.forEach(([name, data], i) => {
    html += `<tr>`;
    html += `<td class="rank-cell">${i + 1}</td>`;
    html += `<td class="name-cell">${escHtml(name)}</td>`;
    html += `<td class="wins-cell">${data.wins}</td>`;
    html += `<td class="total-cell">$${data.total.toLocaleString()}</td>`;
    html += `</tr>`;
  });

  html += `</table>`;
  container.innerHTML = html;
}

// ============================================================
// UTILS
// ============================================================
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function escAttr(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

// ============================================================
// INIT
// ============================================================
async function init() {
  // Load grid (from localStorage or grid-config.json)
  gridData = await loadGrid();
  renderGrid();

  // Hide right-edge shadow when scrolled fully right
  const gridContainer = document.querySelector('.grid-container');
  const scrollOuter = document.querySelector('.grid-scroll-outer');
  gridContainer.addEventListener('scroll', () => {
    const atEnd = gridContainer.scrollLeft + gridContainer.clientWidth >= gridContainer.scrollWidth - 4;
    scrollOuter.classList.toggle('at-end', atEnd);
  });

  // Load results (live API first, then static fallback)
  await loadResults();
  renderResults();
  renderLeaderboard();
}

init();
</script>
